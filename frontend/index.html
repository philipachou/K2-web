<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>K2 Assistive Web System</title>
  
  <!-- Modern clean typography from Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="style.css?v=11">
</head>
<body>
  <div class="app-container">
    
    <!-- Row 0: Chat Log (Left) & Actions Panel (Right) -->
    <div class="top-row">
      <!-- Left Column: Chat Conversation Panel -->
      <section class="panel chat-panel labeled-panel" id="chat-panel">
        <div class="panel-label">Chat Log</div>
        <div class="panel-body">
          <div class="chat-log" id="chat-log-scroll">
            <!-- Messages are rendered dynamically by app.js -->
            <div class="system-message">System initialized. Ready.</div>
          </div>
        </div>
      </section>

      <!-- Right Column: Saved Actions Macro Grid -->
      <section class="panel actions-panel labeled-panel">
        <div class="panel-label">Actions</div>
        <div class="panel-body">
          <div class="panel-header">
            <div class="actions-header-controls">
              <!-- Mode selectors -->
              <div class="action-modes">
                <button id="mode-delete" class="mode-btn">Delete</button>
                <button id="mode-edit" class="mode-btn active">Edit</button>
                <button id="mode-cloud-tts" class="mode-btn">@CloudTTS</button>
                <button id="mode-local-tts" class="mode-btn">@LocalTTS</button>
                <button id="mode-copy" class="mode-btn">Copy</button>
                <button id="mode-cloud" class="mode-btn">@CloudAI</button>
                <button id="mode-recolor" class="mode-btn">Recolor</button>
              </div>
              <!-- Recolor dropdown -->
              <select id="action-color-select" style="display: none;">
                <option value="Blue">Blue</option>
                <option value="Green">Green</option>
                <option value="Red">Red</option>
                <option value="Orange">Orange</option>
                <option value="Purple">Purple</option>
                <option value="Yellow">Yellow</option>
                <option value="Teal">Teal</option>
                <option value="Pink">Pink</option>
                <option value="Gray">Gray</option>
              </select>

              <!-- Custom Recolor dropdown -->
              <div class="custom-dropdown" id="action-color-dropdown">
                <div class="custom-dropdown-trigger" id="color-dropdown-trigger">Blue</div>
                <div class="custom-dropdown-menu" id="color-dropdown-menu">
                  <div class="custom-dropdown-item" data-value="Blue" style="background-color: #1f538d; color: white;">Blue</div>
                  <div class="custom-dropdown-item" data-value="Green" style="background-color: #2ecc71; color: black;">Green</div>
                  <div class="custom-dropdown-item" data-value="Red" style="background-color: #e74c3c; color: white;">Red</div>
                  <div class="custom-dropdown-item" data-value="Orange" style="background-color: #e67e22; color: white;">Orange</div>
                  <div class="custom-dropdown-item" data-value="Purple" style="background-color: #9b59b6; color: white;">Purple</div>
                  <div class="custom-dropdown-item" data-value="Yellow" style="background-color: #f1c40f; color: black;">Yellow</div>
                  <div class="custom-dropdown-item" data-value="Teal" style="background-color: #1abc9c; color: black;">Teal</div>
                  <div class="custom-dropdown-item" data-value="Pink" style="background-color: #e84393; color: white;">Pink</div>
                  <div class="custom-dropdown-item" data-value="Gray" style="background-color: #475569; color: white;">Gray</div>
                </div>
              </div>

              <button id="btn-settings" class="btn btn-settings-icon">&#9881;</button>
            </div>
          </div>
          <div class="actions-list" id="actions-grid">
            <!-- Macros are populated dynamically by app.js -->
          </div>
          <!-- Hover Preview Bar -->
          <div class="actions-preview-bar" id="actions-preview">
            Hover over an action to preview...
          </div>
        </div>
      </section>
    </div>
 
    <!-- Row 1: Editor Toolbar & Editor Text Box -->
    <main class="panel editor-panel labeled-panel">
      <div class="panel-label">Editor</div>
      <div class="panel-body editor-body">
        <!-- Top Edit Toolbar -->
        <div class="edit-toolbar">
          <button id="btn-clear" class="btn btn-gray">Del All</button>
          <button id="btn-del-word" class="btn btn-gray">Del Word</button>
          <button id="btn-del-char" class="btn btn-gray">Del Char</button>
          <button id="btn-dictate" class="btn btn-purple">Dictate</button>
          <button id="btn-cloud-tts" class="btn btn-green">@CloudTTS</button>
          <button id="btn-local-tts" class="btn btn-green">@LocalTTS</button>
          <button id="btn-copy" class="btn btn-green">Copy</button>
          <button id="btn-cloud" class="btn btn-blue">@CloudAI</button>
          <button id="btn-save" class="btn btn-orange">Save</button>
          <button id="btn-save-as" class="btn btn-orange">Save As...</button>
        </div>

        <!-- Editor Text Box (inputmode="none" to prevent virtual OS keyboard) -->
        <div class="textbox-wrapper">
          <textarea id="editor-box" placeholder="Type here..." inputmode="none"></textarea>
        </div>
      </div>
    </main>

    <!-- Row 2: Predictions Bar (WORDS on top, PHRASES below) -->
    <div class="predictions-panel labeled-panel">
      <div class="panel-label">Predictor</div>
      <div class="panel-body predictions-body">
        <div class="prediction-row" id="words-prediction-row">
          <div class="pred-label">WORDS</div>
          <div class="prediction-list-wrapper" id="word-predictions"></div>
        </div>
        <div class="prediction-row" id="phrases-prediction-row">
          <div class="pred-label">PHRASES</div>
          <div class="prediction-list-wrapper" id="phrase-predictions"></div>
          <span id="phrase-thinking" class="thinking-label" style="display: none;">Thinking...</span>
        </div>
      </div>
    </div>

    <!-- Row 3: QWERTY Virtual Keyboard -->
    <div class="keyboard-panel-wrapper labeled-panel">
      <div class="panel-label" style="border: 1px solid var(--glass-border); border-radius: 12px 0 0 12px; border-right: none; background: rgba(15, 23, 42, 0.55);">Keyboard</div>
      <div class="keyboard-container" id="keyboard" style="border-radius: 0 12px 12px 0;">
        <!-- Replaced by JavaScript dynamic canvas-like grid rows -->
      </div>
    </div>

  </div>

  <!-- Settings Modal Dialog -->
  <div class="modal-overlay" id="settings-modal">
    <div class="modal-content">
      <h2>K2 Web Preferences</h2>
      
      <div class="settings-form">
        <div class="form-group">
          <label for="biography-text">Kay's Personal Biography (Free-Form Notes):</label>
          <textarea id="biography-text" placeholder="Write biography facts, relationships, interests, routines here..."></textarea>
          <button id="btn-compile" class="btn btn-teal" style="margin-top: 5px; width: 100%;">Compile Profile via Gemini</button>
        </div>

        <div class="form-group row-group">
          <div>
            <label for="font-editor">Editor Font Size:</label>
            <input type="number" id="font-editor" value="32" min="16" max="64">
          </div>
          <div>
            <label for="font-keyboard">Keyboard Font Size:</label>
            <input type="number" id="font-keyboard" value="24" min="12" max="40">
          </div>
        </div>

        <div class="form-group row-group">
          <div>
            <label for="hover-brightness">Hover Brightness Multiplier:</label>
            <input type="number" id="hover-brightness" value="1.2" min="0.5" max="2.0" step="0.05">
          </div>
          <div style="visibility: hidden;">
          </div>
        </div>

        <div class="form-group row-group">
          <div>
            <label for="min-target-width">Min Target Width (px):</label>
            <input type="number" id="min-target-width" value="50" min="30" max="150">
          </div>
          <div>
            <label for="min-target-height">Min Target Height (px):</label>
            <input type="number" id="min-target-height" value="40" min="20" max="100">
          </div>
        </div>

        <div class="form-group row-group">
          <div>
            <label for="ha-url-input">Home Assistant URL:</label>
            <input type="text" id="ha-url-input" placeholder="https://xxxx.ui.nabu.casa">
          </div>
          <div>
            <label for="ha-token-input">Home Assistant Token:</label>
            <input type="password" id="ha-token-input" placeholder="Long-Lived Access Token">
          </div>
        </div>

        <div class="form-group checkbox-group">
          <label class="switch-label">
            <input type="checkbox" id="basins-of-attraction-toggle">
            Enable Basins of Attraction (Hover Gravity Sizer)
          </label>
        </div>

        <div class="form-group">
          <label for="local-tts-voice-select">Local TTS Voice:</label>
          <select id="local-tts-voice-select" class="dropdown-select" style="width: 100%; margin-top: 5px;">
            <!-- Dynamically populated by speechSynthesis.getVoices() -->
          </select>
        </div>

        <div class="form-group backup-restore-buttons">
          <button id="btn-export-config" class="btn btn-primary">Export Configuration (JSON)</button>
          <button id="btn-import-config" class="btn btn-warning">Import Configuration (JSON)</button>
          <input type="file" id="import-file-input" style="display: none;" accept=".json">
        </div>
      </div>

      <div class="modal-footer">
        <button id="btn-settings-close" class="btn btn-secondary">Close & Save</button>
      </div>
    </div>
  </div>

  <script src="app.js?v=3"></script>
</body>
</html>
